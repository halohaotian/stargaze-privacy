<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #24292f;
      background: #fff;
    }
    h1, h2, h3 { color: #24292f; }
    h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .meta { color: #656d76; font-size: 0.9em; }
    hr { border: 0; border-top: 1px solid #d0d7de; margin: 2em 0; }
    code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
  <hr>
  <p class="meta">
    <a href="https://halohaotian.github.io/stargaze-privacy/">View this policy online</a> ·
    Last updated: 2026-06-25 ·
    <a href="https://github.com/halohaotian/stargaze-privacy">Source on GitHub</a>
  </p>
</body>
</html>
